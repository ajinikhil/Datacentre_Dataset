name: Monthly Cloud Location Dataset Update via Notebook

on:
  schedule:
    - cron: '0 0  * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Run Jupyter Notebook
      working-directory: scripts
      run: |
        python -m papermill colud_location.ipynb executed_colud_location.ipynb

    - name: Commit and Push Changes
      id: commit
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git add datasets/cloud_locations/cloud_locations_dataset.csv scripts/executed_colud_location.ipynb

        if git diff --staged --quiet -- datasets/cloud_locations/cloud_locations_dataset.csv; then
          echo "csv_changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "csv_changed=true" >> "$GITHUB_OUTPUT"
        fi

        if git diff --staged --quiet; then
          echo "No changes detected"
        else
          git commit -m "Automated monthly cloud location dataset update"
          git push
        fi

    - name: Upload to Kaggle
      if: steps.commit.outputs.csv_changed == 'true'
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      run: |
        pip install kaggle
        kaggle datasets version \
          -p datasets/cloud_locations/ \
          -m "Automated monthly update" \
          --dir-mode zip