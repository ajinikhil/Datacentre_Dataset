name: Weekly Cloud Location Dataset Update via Notebook

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at 00:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 1. Write the secret JSON token to a temporary file so Google's library can read it
    - name: Authenticate to Google Cloud
      run: |
        echo "${{ secrets.GCP_SA_KEY }}" > gcp_key.json

    # 2. RUN THE JUPYTER NOTEBOOK USING PAPERMILL
    - name: Run Jupyter Notebook
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ./gcp_key.json
      run: |
        papermill colud_location.ipynb colud_location.ipynb

    # 3. Save the dataset and the updated notebook back to Github
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add datasets/cloud_locations_dataset.csv colud_location.ipynb
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Weekly Dataset Update via Notebook" && git push)