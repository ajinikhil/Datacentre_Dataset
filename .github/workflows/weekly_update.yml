name: Weekly Cloud Location Dataset Update via Notebook

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write   # <-- allows pushing commits

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Run Jupyter Notebook
      working-directory: scripts
      run: |
        python -m papermill colud_location.ipynb colud_location.ipynb

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add datasets/cloud_locations_dataset.csv scripts/colud_location.ipynb
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Weekly Dataset Update via Notebook" && git push)
