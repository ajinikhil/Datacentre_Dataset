name: Weekly Cloud Location Dataset Update

on:
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # This allows you to click a button in GitHub to run it manually anytime

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull the code from your repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install required libraries
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run the data updater script
    - name: Run Script
      run: python update_data.py

    # 5. Commit the new CSV back to your repository automatically
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add datasets/cloud_locations_dataset.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Weekly Dataset Update" && git push)
