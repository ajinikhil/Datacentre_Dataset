name: Monthly Data Centre Dataset Update via Notebook

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Jupyter Notebook
      working-directory: scripts
      env:
        PEERING_DB_API: ${{ secrets.PEERING_DB_API }}
      run: |
        python -m papermill peeringDB.ipynb executed_peeringDB.ipynb

    - name: Commit and Push Changes
      id: commit
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git add datasets/peeringDB/datacentre_list.csv

        if git diff --staged --quiet -- datasets/peeringDB/datacentre_list.csv; then
          echo "csv_changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "csv_changed=true" >> "$GITHUB_OUTPUT"
        fi

        if git diff --staged --quiet; then
          echo "No changes detected"
        else
          git commit -m "Automated monthly datacentre dataset update"
          git push
        fi

    - name: Upload to Kaggle
      if: steps.commit.outputs.csv_changed == 'true'
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      run: |
        pip install kaggle
        kaggle datasets version \
          -p datasets/peeringDB/ \
          -m "Automated monthly update" \
          --dir-mode zip